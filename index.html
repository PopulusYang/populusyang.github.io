<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>猎人小屋</title>
    <style>
        :root {
            --bg-1: #f3efe4;
            --bg-2: #d9e3c5;
            --card: #fffdf8;
            --ink: #2b2a28;
            --accent-a: #3f6f4b;
            --accent-b: #c97732;
            --shadow: rgba(43, 42, 40, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Serif SC", "STZhongsong", "Songti SC", "Microsoft YaHei", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 18% 15%, rgba(255, 255, 255, 0.68), transparent 34%),
                radial-gradient(circle at 82% 78%, rgba(201, 119, 50, 0.22), transparent 35%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .panel {
            width: min(900px, 100%);
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 12px 40px var(--shadow);
            border: 1px solid rgba(63, 111, 75, 0.18);
            padding: 34px 28px;
            animation: rise-in 560ms ease-out both;
        }

        h1 {
            margin: 0;
            text-align: center;
            letter-spacing: 2px;
            font-size: clamp(2rem, 5vw, 2.8rem);
            color: #2f4f38;
        }

        .subtitle {
            margin: 14px auto 28px;
            text-align: center;
            color: #5a5a55;
            max-width: 560px;
            line-height: 1.7;
            font-size: 1rem;
        }

        .module-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .module-button {
            flex: 1;
            min-width: 240px;
            max-width: 360px;
            text-decoration: none;
            color: var(--ink);
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.93), rgba(255, 248, 236, 0.95));
            border: 1px solid rgba(63, 111, 75, 0.2);
            border-radius: 16px;
            padding: 22px 20px;
            transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
            box-shadow: 0 8px 20px rgba(32, 48, 37, 0.08);
        }

        .module-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 26px rgba(32, 48, 37, 0.16);
            border-color: rgba(201, 119, 50, 0.5);
        }

        .module-label {
            font-size: 1.35rem;
            color: #2f4f38;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .module-desc {
            margin: 0;
            color: #5f5b54;
            line-height: 1.6;
            font-size: 0.96rem;
        }

        .today {
            border-left: 5px solid var(--accent-a);
        }

        .rated {
            border-left: 5px solid var(--accent-b);
        }

        @keyframes rise-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .panel {
                padding: 24px 16px;
                border-radius: 14px;
            }

            .module-button {
                max-width: none;
            }
        }
    </style>
</head>

<body>
    <main class="panel">
        <h1>猎人小屋</h1>
        <p class="subtitle">今天是想稳妥进食，还是让骰子替你做决定？</p>

        <section class="module-row" aria-label="功能模块">
            <a class="module-button today" href="dice.html" aria-label="进入今天吃什么模块">
                <div class="module-label">今天吃什么</div>
                <p class="module-desc">进入摇骰子页面，按当前时段随机抽取可吃菜品。</p>
            </a>

            <a class="module-button rated" href="reviewed.html" aria-label="进入已评测模块">
                <div class="module-label">已评测</div>
                <p class="module-desc">查看和搜索全部已收录菜品评分，并支持按列排序。</p>
            </a>
        </section>
    </main>

    <script>
        const VERSION_STORAGE_KEY = 'hunterHutRuntimeVersion';

        function buildVersionStamp() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
        }

        function getSessionVersion() {
            try {
                const stored = sessionStorage.getItem(VERSION_STORAGE_KEY);
                if (stored) return stored;

                const generated = buildVersionStamp();
                sessionStorage.setItem(VERSION_STORAGE_KEY, generated);
                return generated;
            } catch (err) {
                return buildVersionStamp();
            }
        }

        function ensureRuntimeVersion() {
            const url = new URL(window.location.href);
            const sessionVersion = getSessionVersion();

            if (url.searchParams.get('v') !== sessionVersion) {
                url.searchParams.set('v', sessionVersion);
                window.location.replace(url.toString());
                return null;
            }

            return sessionVersion;
        }

        function appendVersionToLinks(version) {
            const links = document.querySelectorAll('a[href$=".html"], a[href*=".html?"]');
            links.forEach(link => {
                const targetUrl = new URL(link.getAttribute('href'), window.location.href);
                targetUrl.searchParams.set('v', version);
                link.setAttribute('href', `${targetUrl.pathname}${targetUrl.search}${targetUrl.hash}`);
            });
        }

        const APP_VERSION = ensureRuntimeVersion();
        if (APP_VERSION) {
            appendVersionToLinks(APP_VERSION);
        }

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                window.location.reload();
            }
        });
    </script>
</body>

</html>
